name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    name: Validate plugin structure
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check plugin.json exists
        run: |
          if [ ! -f ".claude-plugin/plugin.json" ]; then
            echo "ERROR: .claude-plugin/plugin.json not found"
            exit 1
          fi
          echo "plugin.json found"

      - name: Validate plugin.json is valid JSON
        run: |
          cat .claude-plugin/plugin.json | python3 -m json.tool > /dev/null
          echo "plugin.json is valid JSON"

      - name: Validate required plugin.json fields
        run: |
          python3 - <<'EOF'
          import json, sys

          with open(".claude-plugin/plugin.json") as f:
              plugin = json.load(f)

          required = ["name", "description", "version"]
          missing = [f for f in required if f not in plugin]
          if missing:
              print(f"ERROR: Missing required fields in plugin.json: {missing}")
              sys.exit(1)

          print(f"Plugin: {plugin['name']} v{plugin['version']}")
          print("All required fields present")
          EOF

      - name: Validate skill files exist and have frontmatter
        run: |
          python3 - <<'EOF'
          import os, sys

          skills_dir = "skills"
          errors = []

          if not os.path.isdir(skills_dir):
              print(f"ERROR: {skills_dir}/ directory not found")
              sys.exit(1)

          for skill_name in os.listdir(skills_dir):
              skill_path = os.path.join(skills_dir, skill_name, "SKILL.md")
              if not os.path.isfile(skill_path):
                  errors.append(f"Missing SKILL.md in skills/{skill_name}/")
                  continue
              with open(skill_path) as f:
                  content = f.read()
              if not content.startswith("---"):
                  errors.append(f"skills/{skill_name}/SKILL.md missing YAML frontmatter")
              else:
                  print(f"  skills/{skill_name}/SKILL.md OK")

          if errors:
              for e in errors:
                  print(f"ERROR: {e}")
              sys.exit(1)

          print("All skill files valid")
          EOF

      - name: Validate hook scripts are executable
        run: |
          ERRORS=0
          for hook in hooks/session-end.sh hooks/session-start.sh; do
            if [ ! -f "$hook" ]; then
              echo "ERROR: $hook not found"
              ERRORS=$((ERRORS+1))
            elif [ ! -x "$hook" ]; then
              echo "ERROR: $hook is not executable"
              ERRORS=$((ERRORS+1))
            else
              echo "  $hook OK"
            fi
          done
          if [ "$ERRORS" -gt 0 ]; then exit 1; fi
          echo "All hooks valid"

      - name: Validate hooks reference matches plugin.json
        run: |
          python3 - <<'EOF'
          import json, os, sys

          with open(".claude-plugin/plugin.json") as f:
              plugin = json.load(f)

          hooks = plugin.get("hooks", {})
          errors = []
          for event, path in hooks.items():
              if not os.path.isfile(path):
                  errors.append(f"Hook '{event}' references missing file: {path}")
              else:
                  print(f"  Hook {event} -> {path} OK")

          if errors:
              for e in errors:
                  print(f"ERROR: {e}")
              sys.exit(1)
          EOF

  mcp-smoke-test:
    name: MCP server smoke test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Verify MCP package is available on npm
        run: |
          VERSION=$(npm view ainative-zerodb-memory-mcp version 2>/dev/null || echo "")
          if [ -z "$VERSION" ]; then
            echo "ERROR: ainative-zerodb-memory-mcp not found on npm"
            exit 1
          fi
          echo "ainative-zerodb-memory-mcp@$VERSION found on npm"

      - name: Dry-run MCP server install
        run: |
          npx --yes ainative-zerodb-memory-mcp@latest --help 2>&1 || true
          echo "MCP server package installs successfully"
